    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambientní záře na pozadí přesně jako má Xeno */
        .bg-glow-1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: 20%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 15%;
            z-index: 0;
            pointer-events: none;
        }

        /* Hlavní hero sekce */
        .hero {
            text-align: center;
            z-index: 1;
            max-width: 800px;
            padding: 20px;
        }

        .logo-container {
            font-size: 64px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.4));
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            color: #ffffff;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        /* Originální Xeno podnadpis */
        .tagline {
            font-size: 20px;
            color: #a1a1aa;
            font-weight: 400;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .tagline span {
            color: #ffffff;
            font-weight: 500;
        }

        /* Rozvržení tlačítek */
        .cta-group {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.3px;
        }

        /* Hlavní Xeno fialovo-modrý gradient tlačítka */
        .btn-primary {
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            color: #ffffff;
            box-shadow: 0 4px 30px rgba(168, 85, 247, 0.25);
            border: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 35px rgba(168, 85, 247, 0.4);
            filter: brightness(1.1);
        }

        /* Vedlejší tmavé minimalistické tlačítko */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            color: #e4e4e7;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(244, 63, 94, 0.4);
            color: #f43f5e;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Spodní jemný text */
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 13px;
            color: #52525b;
            z-index: 1;
            font-weight: 400;
        }

        .footer a {
            color: #71717a;
            text-decoration: none;
        }
    </style>
</head>
